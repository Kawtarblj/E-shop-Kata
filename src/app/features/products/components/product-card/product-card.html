 <div class="card">

      <img [src]="product().image" />

      <h3>{{ product().title }}</h3>

      <p>{{ product().description }}</p>
      <p>{{ product().category }}</p>

      <p class="price">{{ product().price }} $</p>

      <button class="btn btn-primary" (click)="addToCart()">
        Add to Cart
      </button>

    </div>
